{% extends 'base.html' %}
{% block title %}Delete Prescription{% endblock %}
{% block content %}
<div class="page-header"><h2>Delete Prescription</h2></div>
<div class="card" style="max-width: 500px;">
    <div class="confirm-box">
        <div class="confirm-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
        </div>
        <h3>Delete Prescription?</h3>
        <p>Prescription for {{ prescription.patient.full_name }} and all associated medicines will be permanently removed.</p>
        <form method="post">
            {% csrf_token %}
            <div class="confirm-actions">
                <a href="{% url 'prescription_list' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
