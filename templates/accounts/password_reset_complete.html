{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card" style="text-align: center;">
        <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--success-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
        </div>
        <h2>Password Reset Complete!</h2>
        <p class="auth-subtitle">Your password has been set. You can now sign in with your new password.</p>
        <a href="{% url 'login' %}" class="btn btn-primary btn-lg" style="margin-top: 12px;">Sign In</a>
    </div>
</div>
{% endblock %}
