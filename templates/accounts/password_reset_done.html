{% extends 'base.html' %}
{% block title %}Email Sent{% endblock %}
{% block auth_content %}
<div class="auth-wrapper">
    <div class="auth-card" style="text-align: center;">
        <div style="width: 64px; height: 64px; border-radius: 50%; background: var(--info-bg); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="var(--info)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        </div>
        <h2>Check Your Email</h2>
        <p class="auth-subtitle">We've sent a password reset link to your email address. Please check your inbox and follow the instructions.</p>
        <a href="{% url 'login' %}" class="btn btn-secondary" style="margin-top: 12px;">Back to Login</a>
    </div>
</div>
{% endblock %}
